name: hiking_tracker
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.4+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  geolocator: ^14.0.2
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  image_picker: ^1.2.1
  provider: ^6.1.5+1
  http: ^1.6.0
  shared_preferences: ^2.5.4
  flutter_local_notifications: ^17.1.2
  google_fonts: ^8.0.2
  flutter_foreground_task: ^9.2.1
  google_maps_flutter: ^2.16.0
  apple_maps_flutter: ^1.4.0
  intl: ^0.20.2
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/mountains.json
    - assets/images/
